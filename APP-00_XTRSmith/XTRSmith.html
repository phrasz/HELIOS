<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTRSmith - Widget Hub</title>
<style>
:root{
  --bg:#0B0E0F;
  --bg-grid:#10151670;
  --panel:#151A1C;
  --panel2:#1B2225;
  --panel3:#20292C;
  --line:rgba(140,170,160,0.14);
  --line-strong:rgba(140,170,160,0.28);
  --amber:#FFB020;
  --amber-dim:#8a611c;
  --cyan:#49D3D9;
  --cyan-dim:#1c4a4c;
  --lime:#8BD450;
  --red:#E85C4A;
  --text:#E7ECE9;
  --text-dim:#8A9490;
  --mono: ui-monospace, "Cascadia Code", "SF Mono", "JetBrains Mono", Consolas, monospace;
  --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --gui-font-size: 14px;
}
html[data-theme="light"]{
  --bg:#EDEFEA;
  --bg-grid:#c9d0c840;
  --panel:#FFFFFF;
  --panel2:#F3F5F0;
  --panel3:#E8ECE4;
  --line:rgba(40,55,45,0.14);
  --line-strong:rgba(40,55,45,0.30);
  --amber:#B36B00;
  --amber-dim:#e2b46c;
  --cyan:#0E7C82;
  --cyan-dim:#bfe2e2;
  --lime:#3E7A25;
  --red:#B3402C;
  --text:#171B19;
  --text-dim:#5B655F;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:var(--sans); font-size:var(--gui-font-size);
  background-image:
    repeating-linear-gradient(0deg, var(--bg-grid) 0px, transparent 1px, transparent 28px, var(--bg-grid) 29px),
    repeating-linear-gradient(90deg, var(--bg-grid) 0px, transparent 1px, transparent 28px, var(--bg-grid) 29px);
  transition:background-color .15s, color .15s;
}
.app{display:grid; grid-template-columns:220px 1fr; grid-template-rows:56px 1fr 30px; height:100vh; grid-template-areas:"topbar topbar" "nav main" "nav status";}
.topbar{grid-area:topbar; display:flex; align-items:center; justify-content:space-between; padding:0 18px; border-bottom:1px solid var(--line-strong); background:linear-gradient(180deg,var(--panel2),var(--panel));}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{width:26px;height:26px; position:relative; border:2px solid var(--cyan); transform:rotate(45deg); flex:none;}
.brand-mark::after{content:""; position:absolute; inset:4px; border:1px solid var(--cyan); opacity:.6;}
.brand-text{font-family:var(--mono); letter-spacing:2px; text-transform:uppercase; font-size:calc(var(--gui-font-size) * 13/14); color:var(--text);}
.brand-text b{color:var(--cyan);}
.brand-sub{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 10/14); color:var(--text-dim); letter-spacing:1px; margin-top:1px;}
.topbar-actions{display:flex; gap:8px; align-items:center;}
.btn{
  font-family:var(--mono); font-size:calc(var(--gui-font-size) * 11/14); letter-spacing:.5px; text-transform:uppercase;
  background:var(--panel3); color:var(--text); border:1px solid var(--line-strong);
  padding:7px 12px; cursor:pointer; clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
  transition:border-color .15s, color .15s;
}
.btn:hover{border-color:var(--cyan); color:var(--cyan);}
.btn.primary{border-color:var(--cyan); color:var(--cyan);}
.btn.danger:hover{border-color:var(--red); color:var(--red);}
.btn.small{padding:3px 8px; font-size:calc(var(--gui-font-size) * 10/14);}
.btn:disabled{opacity:.35; cursor:not-allowed;}
input[type=file]{display:none;}

.nav{grid-area:nav; background:var(--panel); border-right:1px solid var(--line-strong); padding:14px 10px; display:flex; flex-direction:column; gap:6px;}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:10px 10px; cursor:pointer;
  border:1px solid transparent; color:var(--text-dim); font-family:var(--mono); font-size:calc(var(--gui-font-size) * 12/14); letter-spacing:.5px; text-transform:uppercase;
  position:relative;
}
.nav-item .idx{font-size:calc(var(--gui-font-size) * 10/14); color:var(--text-dim); width:18px; flex:none;}
.nav-item:hover{color:var(--text); background:var(--panel2);}
.nav-item.active{color:var(--cyan); border-color:var(--line-strong); background:var(--panel2); border-left:3px solid var(--cyan); padding-left:7px;}
.nav-item.active .idx{color:var(--cyan);}
.nav-sep{height:1px; background:var(--line); margin:8px 4px;}
.nav-hint{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 10/14); color:var(--text-dim); padding:8px 10px; line-height:1.5; opacity:.8;}

.main{grid-area:main; overflow:auto; padding:20px 24px;}
.status{grid-area:status; border-top:1px solid var(--line); background:var(--panel); display:flex; align-items:center; padding:0 16px; gap:18px; font-family:var(--mono); font-size:calc(var(--gui-font-size) * 10/14); color:var(--text-dim); letter-spacing:.5px;}
.status b{color:var(--cyan);}

.panel{
  border:1px solid var(--line-strong); background:var(--panel); position:relative; padding:16px; margin-bottom:16px;
}
.panel::before, .panel::after{content:""; position:absolute; width:10px; height:10px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); top:-1px; left:-1px;}
.panel::after{left:auto; right:-1px; top:auto; bottom:-1px; border-top:none; border-left:none; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan);}

.section-title{font-family:var(--mono); text-transform:uppercase; letter-spacing:2px; font-size:calc(var(--gui-font-size) * 12/14); color:var(--cyan); margin:0 0 12px 0; display:flex; align-items:center; gap:8px;}
.section-title .n{color:var(--text-dim); font-weight:normal;}

.gear-btn{
  width:34px; height:34px; display:flex; align-items:center; justify-content:center;
  background:var(--panel3); border:1px solid var(--line-strong); color:var(--text-dim); cursor:pointer;
  clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
  transition:color .15s, border-color .15s, transform .2s;
}
.gear-btn:hover{color:var(--cyan); border-color:var(--cyan);}
.gear-btn:hover svg{transform:rotate(35deg);}

.drawer-backdrop{position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:90; opacity:0; pointer-events:none; transition:opacity .2s;}
.drawer-backdrop.open{opacity:1; pointer-events:auto;}
.drawer{
  position:fixed; top:0; right:0; height:100vh; width:340px; max-width:88vw;
  background:var(--panel); border-left:1px solid var(--line-strong); z-index:91;
  transform:translateX(100%); transition:transform .22s ease; overflow-y:auto; padding:18px;
  box-shadow:-8px 0 30px rgba(0,0,0,0.3);
}
.drawer.open{transform:translateX(0);}
.drawer-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--line-strong);}
.drawer-title{font-family:var(--mono); text-transform:uppercase; letter-spacing:2px; font-size:calc(var(--gui-font-size) * 13/14); color:var(--cyan);}
.drawer-section{margin-bottom:22px;}
.drawer-section-title{font-family:var(--mono); text-transform:uppercase; letter-spacing:1.5px; font-size:calc(var(--gui-font-size) * 11/14); color:var(--text-dim); margin-bottom:10px;}
.drawer-row{display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap;}
.drawer-desc{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 10.5/14); color:var(--text-dim); line-height:1.5; margin-top:4px;}
.seg-group{display:flex; border:1px solid var(--line-strong);}
.seg-btn{
  font-family:var(--mono); font-size:calc(var(--gui-font-size) * 11/14); text-transform:uppercase; padding:7px 12px; cursor:pointer;
  background:var(--panel3); color:var(--text-dim); border:none; border-right:1px solid var(--line-strong);
}
.seg-btn:last-child{border-right:none;}
.seg-btn.active{background:var(--cyan); color:#0B0E0F;}

.font-size-control{display:flex; align-items:center; gap:12px;}
.font-size-slider{flex:1; min-width:150px; cursor:pointer;}
.font-size-input{width:50px; background:var(--panel3); border:1px solid var(--line-strong); color:var(--text); font-family:var(--mono); padding:6px 8px; font-size:calc(var(--gui-font-size) * 12/14);}
.font-size-input:focus{outline:none; border-color:var(--cyan);}

/* STAT BOXES (shared: WPM) */
.stat-box{background:var(--panel2); border:1px solid var(--line-strong); padding:14px; position:relative;}
.stat-box::before{content:""; position:absolute; width:8px; height:8px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); top:-1px; left:-1px;}
.stat-box::after{content:""; position:absolute; width:8px; height:8px; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); bottom:-1px; right:-1px;}
.stat-box.compact{padding:10px 12px;}
.stat-label{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 10/14); text-transform:uppercase; color:var(--text-dim); letter-spacing:1px; margin-bottom:6px;}
.stat-value{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 22/14); color:var(--cyan); font-weight:bold; margin:0;}
.stat-value.small{font-size:calc(var(--gui-font-size) * 17/14);}
.stat-unit{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 10/14); color:var(--text-dim); margin-top:2px;}
.time-breakdown{background:var(--panel3); border-left:3px solid var(--cyan); padding:10px 12px; margin-top:12px;}
.time-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; font-family:var(--mono); font-size:calc(var(--gui-font-size) * 11/14);}
.time-row:last-child{margin-bottom:0;}
.time-label{color:var(--text-dim);}
.time-value{color:var(--lime); font-weight:bold;}
.empty-state{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 12/14); color:var(--text-dim); text-align:center; padding:40px 20px;}
.stat-strip{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px;}

/* EDITOR / COMPOSE */
.editor-toolbar{display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap;}
.editor-title-input{
  background:var(--panel3); border:1px solid var(--line-strong); color:var(--text); font-family:var(--mono);
  padding:8px 10px; font-size:calc(var(--gui-font-size) * 12/14); flex:1; min-width:180px; outline:none;
}
.editor-title-input:focus{border-color:var(--cyan);}
.editor-container{display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start;}
.editor-col-label{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 11/14); text-transform:uppercase; color:var(--text-dim); letter-spacing:1px; margin-bottom:8px;}
.editor-textarea{
  width:100%; background:var(--panel3); border:1px solid var(--line-strong); color:var(--text); font-family:var(--mono);
  padding:12px; font-size:calc(var(--gui-font-size) * 12/14); resize:vertical; min-height:420px;
  outline:none; transition:border-color .15s; line-height:1.6;
}
.editor-textarea:focus{border-color:var(--cyan);}
.editor-preview{
  background:var(--panel3); border:1px solid var(--line-strong); padding:16px; min-height:420px; overflow:auto;
  font-family:var(--sans); line-height:1.65; font-size:calc(var(--gui-font-size) * 13/14);
}
.editor-preview h1,.editor-preview h2,.editor-preview h3,.editor-preview h4{color:var(--cyan); font-family:var(--sans); margin:0.6em 0 0.3em;}
.editor-preview h1:first-child,.editor-preview h2:first-child,.editor-preview h3:first-child{margin-top:0;}
.editor-preview p{margin:0.6em 0;}
.editor-preview a{color:var(--cyan);}
.editor-preview strong{color:var(--amber);}
.editor-preview code{background:var(--panel2); padding:2px 5px; font-family:var(--mono); font-size:0.9em;}
.editor-preview pre{background:var(--panel2); padding:12px; overflow-x:auto; border-left:3px solid var(--cyan);}
.editor-preview pre code{background:none; padding:0;}
.editor-preview blockquote{border-left:3px solid var(--cyan); margin:0.6em 0; padding:2px 14px; color:var(--text-dim);}
.editor-preview ul,.editor-preview ol{padding-left:22px; margin:0.6em 0;}
.editor-preview hr{border:none; border-top:1px solid var(--line-strong); margin:1em 0;}
.editor-preview table{border-collapse:collapse; margin:0.6em 0;}
.editor-preview th,.editor-preview td{border:1px solid var(--line-strong); padding:6px 10px;}
.editor-empty{font-family:var(--mono); color:var(--text-dim); font-size:calc(var(--gui-font-size) * 11/14); font-style:italic;}

.check-row{display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--line);}
.check-row:last-child{border-bottom:none;}
.check-icon{flex:none; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:bold; font-size:calc(var(--gui-font-size) * 12/14); border-radius:50%;}
.check-icon.pass{color:var(--lime); border:1px solid var(--lime);}
.check-icon.warn{color:var(--amber); border:1px solid var(--amber);}
.check-body{flex:1;}
.check-title{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 11.5/14); color:var(--text); letter-spacing:.3px;}
.check-detail{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 10.5/14); color:var(--text-dim); margin-top:3px; line-height:1.5;}
.check-detail .flagged{color:var(--red);}

/* CHAT CHECK */
.chatcheck-textarea{
  width:100%; background:var(--panel3); border:1px solid var(--line-strong); color:var(--text); font-family:var(--mono);
  padding:12px; font-size:calc(var(--gui-font-size) * 12/14); resize:vertical; min-height:160px;
  outline:none; transition:border-color .15s; line-height:1.6; margin-bottom:14px;
}
.chatcheck-textarea:focus{border-color:var(--cyan);}
.chatcheck-summary{
  font-family:var(--mono); font-size:calc(var(--gui-font-size) * 12/14); letter-spacing:.5px;
  padding:10px 14px; border:1px solid var(--line-strong); background:var(--panel2); margin-bottom:14px;
}
.chatcheck-summary.all-pass{border-color:var(--lime); color:var(--lime);}
.chatcheck-summary.has-warn{border-color:var(--amber); color:var(--amber);}

/* DRAFTS */
.draft-card{background:var(--panel2); border:1px solid var(--line-strong); padding:14px; margin-bottom:10px; position:relative;}
.draft-card-row{display:flex; gap:10px; align-items:center; margin-bottom:8px; flex-wrap:wrap;}
.draft-title-input{
  background:var(--panel3); border:1px solid var(--line-strong); color:var(--text); font-family:var(--mono);
  padding:6px 10px; font-size:calc(var(--gui-font-size) * 12/14); flex:1; min-width:160px; outline:none;
}
.draft-title-input:focus{border-color:var(--cyan);}
.draft-meta{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 10/14); color:var(--text-dim); letter-spacing:.5px; margin-bottom:6px;}
.draft-snippet{font-family:var(--mono); font-size:calc(var(--gui-font-size) * 10.5/14); color:var(--text-dim); line-height:1.5; max-height:2.8em; overflow:hidden;}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script type="module">
import { marked } from "https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/lib/marked.esm.js";
marked.setOptions({ gfm:true, breaks:true });

var settings = { theme:'dark', guiFontSize:16, wpmBaseline:260, chatWordCeiling:60 };
var currentWidget = 'editor';
var drawerOpen = false;
var activeEditorTab = 'preview';
var SETTINGS_KEY = 'xtrsmith_settings';
var EDITOR_STATE_KEY = 'xtrsmith_editor_state';
var DRAFTS_KEY = 'xtrsmith_drafts_v1';
var CHATCHECK_KEY = 'xtrsmith_chatcheck_content';

var FILLER_PHRASES = [
  'just wondering if', 'in my opinion', 'actually', 'sorry to bother you but',
  'i think that', 'kind of', 'sort of', 'just a quick question',
  'no worries but', 'just checking in', 'i just wanted to', 'basically'
];
var WEAK_PARTICIPLES = [
  'done','given','made','taken','written','known','shown','seen','gone','said',
  'held','found','told','put','set','decided','updated','completed','finished',
  'reviewed','approved','fixed','changed','created','sent'
];

function loadChatCheckContent(){
  try{ return localStorage.getItem(CHATCHECK_KEY) || ''; }catch(e){ return ''; }
}
function saveChatCheckContent(text){
  try{ localStorage.setItem(CHATCHECK_KEY, text); }catch(e){ console.error('Could not save chat check content:', e); }
}

function applyTheme(){
  document.documentElement.setAttribute('data-theme', settings.theme);
}
function applyFontSize(){
  document.documentElement.style.setProperty('--gui-font-size', settings.guiFontSize + 'px');
}
function saveSettings(){
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }catch(e){ console.error('Could not save settings:', e); }
}
function loadSettings(){
  try{
    var saved = localStorage.getItem(SETTINGS_KEY);
    if(saved){
      var loaded = JSON.parse(saved);
      settings = Object.assign(settings, loaded);
    }
  }catch(e){ console.error('Could not load settings:', e); }
}

function loadEditorState(){
  try{
    var saved = JSON.parse(localStorage.getItem(EDITOR_STATE_KEY));
    if(saved) return Object.assign({content:'', draftId:null, title:'Untitled draft'}, saved);
  }catch(e){ console.error('Could not load editor state:', e); }
  return {content:'', draftId:null, title:'Untitled draft'};
}
function saveEditorState(){
  try{ localStorage.setItem(EDITOR_STATE_KEY, JSON.stringify(editorState)); }catch(e){ console.error('Could not save editor state:', e); }
}
var editorState = loadEditorState();

function loadDrafts(){
  try{ return JSON.parse(localStorage.getItem(DRAFTS_KEY)) || []; }catch(e){ return []; }
}
function saveDrafts(arr){
  try{ localStorage.setItem(DRAFTS_KEY, JSON.stringify(arr)); }catch(e){ console.error('Could not save drafts:', e); }
}

function $(sel, root){ return (root||document).querySelector(sel); }
function el(tag, attrs, children){
  var e = document.createElement(tag);
  attrs = attrs || {};
  Object.keys(attrs).forEach(function(k){
    if(k === 'class') e.className = attrs[k];
    else if(k === 'html') e.innerHTML = attrs[k];
    else if(k === 'style') e.setAttribute('style', attrs[k]);
    else if(k.indexOf('on') === 0) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  (children||[]).forEach(function(c){ if(c) e.appendChild(c); });
  return e;
}
function txt(s){ return document.createTextNode(s == null ? '' : s); }

function renderShell(){
  applyTheme();
  applyFontSize();
  var app = $('#app');
  app.innerHTML = '';
  app.appendChild(buildTopbar());
  app.appendChild(buildNav());
  var main = el('div',{class:'main', id:'main'});
  app.appendChild(main);
  app.appendChild(buildStatus());
  renderDrawer();
  renderWidget();
}

function buildTopbar(){
  var top = el('div',{class:'topbar'});
  var brand = el('div',{class:'brand'});
  var brandText = el('div',{},[
    el('div',{class:'brand-text'},[txt('XTR'), (function(){var b=document.createElement('b');b.textContent='Smith';return b;})()]),
    el('div',{class:'brand-sub'},[txt('WIDGET HUB \u00b7 Improve your Chats!')])
  ]);
  brand.appendChild(el('div',{class:'brand-mark'}));
  brand.appendChild(brandText);
  top.appendChild(brand);

  var actions = el('div',{class:'topbar-actions'});
  var gearBtn = el('button',{class:'gear-btn', title:'Settings', onclick:function(){ drawerOpen = true; renderDrawer(); }});
  gearBtn.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>';
  actions.appendChild(gearBtn);
  top.appendChild(actions);
  return top;
}

var WIDGETS = [
  {id:'editor', idx:'01', label:'Compose'},
  {id:'draft', idx:'02', label:'Drafts'},
  {id:'chatcheck', idx:'03', label:'Chat Check'},
  {id:'library', idx:'04', label:'Library'},
  {id:'settings-ext', idx:'05', label:'Advanced'}
];

function buildNav(){
  var nav = el('div',{class:'nav'});
  WIDGETS.forEach(function(item){
    var active = currentWidget === item.id;
    nav.appendChild(el('div',{class:'nav-item'+(active?' active':''), onclick:function(){ currentWidget = item.id; renderShell(); }},[
      el('span',{class:'idx'},[txt(item.idx)]),
      el('span',{},[txt(item.label)])
    ]));
  });
  nav.appendChild(el('div',{class:'nav-sep'}));
  nav.appendChild(el('div',{class:'nav-hint'},[txt('Write in Markdown, preview it rendered, and check it against some rules before you post.')]));
  return nav;

function computeBrevity(text){
  var trimmed = text.trim();
  var words = trimmed ? trimmed.split(/\s+/).length : 0;
  var chars = text.length;
  var wpm = settings.wpmBaseline;
  var minutes = words ? Math.ceil(words / wpm) : 0;
  var seconds = words ? Math.round((words / wpm) * 60) : 0;

  var sentences = trimmed ? trimmed.split(/(?<=[.!?])\s+/).map(function(s){return s.trim();}).filter(Boolean) : [];
  var longSentences = sentences.filter(function(s){ return s.split(/\s+/).filter(Boolean).length > 25; });
  var avgWordsPerSentence = sentences.length ? Math.round(words / sentences.length) : 0;

  var paragraphs = trimmed ? trimmed.split(/\n\s*\n+/).map(function(p){return p.trim();}).filter(Boolean) : [];
  var denseParagraphs = paragraphs.filter(function(p){ return p.split(/\s+/).filter(Boolean).length > 120; });

  var firstPara = paragraphs[0] || '';
  var hasBoldLead = /\*\*[^*]+\*\*/.test(firstPara.slice(0, 160));

  var listMatches = text.match(/^[ \t]*([-*+]|\d+\.)\s+/gm) || [];

  return {
    words: words, chars: chars, minutes: minutes, seconds: seconds,
    sentenceCount: sentences.length, avgWordsPerSentence: avgWordsPerSentence,
    longSentences: longSentences, paragraphCount: paragraphs.length,
    denseParagraphs: denseParagraphs, hasBoldLead: hasBoldLead,
    listItemCount: listMatches.length
  };
}

/* ---------- Chat Check (short message linter) ---------- */
function computeChatChecks(text, ceiling){
  var trimmed = text.trim();
  var words = trimmed ? trimmed.split(/\s+/).length : 0;
  var lower = trimmed.toLowerCase();
  var lines = text.split(/\n/).map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 0; });
  var sentencesGlobal = trimmed ? trimmed.split(/(?<=[.!?])\s+/).map(function(s){return s.trim();}).filter(Boolean) : [];
  var avgWordsPerSentence = sentencesGlobal.length ? Math.round(words / sentencesGlobal.length) : 0;
  var newlineCount = (text.match(/\n/g) || []).length;

  var formattingCount =
    (text.match(/\*\*[^*]+\*\*/g) || []).length +
    (text.match(/^[ \t]*([-*+]|\d+\.)\s+/gm) || []).length +
    (text.match(/`[^`]+`/g) || []).length;

  var fillerHits = FILLER_PHRASES.filter(function(p){ return lower.indexOf(p) !== -1; });

  var isNakedGreeting = trimmed.length > 0 && trimmed.length < 15 && /^(hey|hi|hello|yo|sup|hiya|howdy)[!.\s]*$/i.test(trimmed);

  var longLines = lines.filter(function(line){
    var lw = line.split(/\s+/).filter(Boolean).length;
    var ls = line.split(/(?<=[.!?])\s+/).filter(Boolean).length;
    return lw > 40 || ls > 3;
  });

  var whitespaceOk = words <= 30 || newlineCount >= Math.floor(words / 30);

  var urlRegex = /(https?:\/\/[^\s]+|www\.[^\s]+)/gi;
  var embeddedUrls = [];
  lines.forEach(function(line){
    var m = line.match(urlRegex);
    if(m){ m.forEach(function(u){ if(line !== u) embeddedUrls.push(u); }); }
  });

  var passiveRegexA = /\b(is|are|was|were|be|been|being)\s+\w+ed\b/gi;
  var passiveRegexB = new RegExp('\\b(is|are|was|were|be|been|being)\\s+(' + WEAK_PARTICIPLES.join('|') + ')\\b', 'gi');
  var passiveHits = (text.match(passiveRegexA) || []).concat(text.match(passiveRegexB) || []);
  passiveHits = passiveHits.filter(function(v, i, arr){ return arr.indexOf(v) === i; });

  var wpm = settings.wpmBaseline;
  var readSeconds = words ? Math.round((words / wpm) * 60) : 0;

  return {
    words: words, ceiling: ceiling, overCeiling: words > ceiling,
    longLines: longLines, fillerHits: fillerHits, isNakedGreeting: isNakedGreeting,
    whitespaceOk: whitespaceOk, formattingCount: formattingCount,
    avgWordsPerSentence: avgWordsPerSentence, passiveHits: passiveHits,
    embeddedUrls: embeddedUrls, readSeconds: readSeconds
  };
}

function updateChatCheckPanel(){
  var textarea = $('#chatCheckInput');
  var results = $('#chatCheckResults');
  if(!results) return;

  var text = textarea ? textarea.value : '';
  var c = computeChatChecks(text, settings.chatWordCeiling);
  results.innerHTML = '';

  if(!text.trim()){
    results.appendChild(el('div',{class:'empty-state'},[txt('Nothing to check yet. Paste your message above.')]));
    return;
  }

  var checks = [];

  checks.push({
    pass: !c.overCeiling,
    title: 'Total word count',
    detail: c.overCeiling
      ? c.words + ' words \u2014 over your ' + c.ceiling + '-word ceiling. Trim it down.'
      : c.words + ' words \u2014 within your ' + c.ceiling + '-word ceiling.'
  });

  checks.push({
    pass: c.longLines.length === 0,
    title: 'Paragraph / line length',
    detail: c.longLines.length === 0
      ? 'No line runs over 3 sentences or 40 words.'
      : c.longLines.length + ' line(s) exceed 3 sentences or 40 words \u2014 break them up.'
  });

  checks.push({
    pass: c.fillerHits.length === 0,
    title: 'Filler phrases',
    detail: c.fillerHits.length === 0
      ? 'No filler phrases detected.'
      : 'Found: ' + c.fillerHits.map(function(f){ return '\u201c' + f + '\u201d'; }).join(', ')
  });

  checks.push({
    pass: !c.isNakedGreeting,
    title: 'Naked greeting',
    detail: c.isNakedGreeting
      ? 'This is just a greeting with no actual question or point \u2014 add the substance.'
      : 'Not just a bare "hey" / "hi" \u2014 good.'
  });

  checks.push({
    pass: c.whitespaceOk,
    title: 'Wall of text',
    detail: c.whitespaceOk
      ? 'Line breaks keep this skimmable.'
      : 'Too dense \u2014 add a line break roughly every 30 words.'
  });

  var needsFormatting = c.words > 40 && c.formattingCount === 0;
  checks.push({
    pass: !needsFormatting,
    title: 'Formatting for emphasis',
    detail: needsFormatting
      ? 'Over 40 words with zero bold / bullets / code \u2014 emphasize the key point.'
      : (c.formattingCount + ' formatting element(s) found.')
  });

  var sentenceOk = c.avgWordsPerSentence <= 15;
  checks.push({
    pass: sentenceOk,
    title: 'Sentence complexity',
    detail: sentenceOk
      ? 'Averaging ' + c.avgWordsPerSentence + ' words per sentence \u2014 punchy.'
      : 'Averaging ' + c.avgWordsPerSentence + ' words per sentence \u2014 split some up.'
  });

  checks.push({
    pass: c.passiveHits.length === 0,
    title: 'Passive voice / weak verbs',
    detail: c.passiveHits.length === 0
      ? 'No obvious passive constructions.'
      : 'Found: ' + c.passiveHits.slice(0,4).map(function(p){ return '\u201c' + p + '\u201d'; }).join(', ')
  });

  checks.push({
    pass: c.embeddedUrls.length === 0,
    title: 'Link cleanliness',
    detail: c.embeddedUrls.length === 0
      ? 'No raw URLs buried mid-sentence.'
      : c.embeddedUrls.length + ' raw URL(s) embedded in a sentence \u2014 put on their own line or hyperlink the text.'
  });

  var readOk = c.readSeconds <= 15;
  checks.push({
    pass: readOk,
    title: 'Estimated read time',
    detail: readOk
      ? '~' + c.readSeconds + 's to read \u2014 quick.'
      : '~' + c.readSeconds + 's to read \u2014 over the 15s target, consider trimming.'
  });

  var passCount = checks.filter(function(ch){ return ch.pass; }).length;
  var summary = el('div',{class:'chatcheck-summary ' + (passCount === checks.length ? 'all-pass' : 'has-warn')},[
    txt(passCount + ' / ' + checks.length + ' checks passed')
  ]);
  results.appendChild(summary);

  var box = el('div',{class:'stat-box'});
  checks.forEach(function(ch){
    var row = el('div',{class:'check-row'});
    row.appendChild(el('div',{class:'check-icon '+(ch.pass?'pass':'warn')},[txt(ch.pass?'\u2713':'!')]));
    var body = el('div',{class:'check-body'});
    body.appendChild(el('div',{class:'check-title'},[txt(ch.title)]));
    body.appendChild(el('div',{class:'check-detail'},[txt(ch.detail)]));
    row.appendChild(body);
    box.appendChild(row);
  });
  results.appendChild(box);
}

/* ---------- Drafts ---------- */
function renderDrafts(){
  var wrap = el('div',{class:'panel'});
  var titleRow = el('div',{class:'section-title'},[txt('DRAFTS'), el('span',{class:'n'},[txt('saved locally in this browser')])]);
  wrap.appendChild(titleRow);

  var newBtn = el('button',{class:'btn small primary', style:'margin-bottom:14px;', onclick:function(){
    var hasContent = editorState.content && editorState.content.trim().length > 0;
    if(hasContent && !confirm('Start a new draft? Unsaved changes to the current text will be lost unless you Save first.')) return;
    editorState = {content:'', draftId:null, title:'Untitled draft'};
    saveEditorState();
    currentWidget = 'editor';
    renderShell();
  }},[txt('+ New Draft')]);
  wrap.appendChild(newBtn);

  var drafts = loadDrafts().slice().sort(function(a,b){ return b.updatedAt - a.updatedAt; });

  if(drafts.length === 0){
    wrap.appendChild(el('div',{class:'empty-state'},[txt('No saved drafts yet. Write something in Compose and hit Save.')]));
    return wrap;
  }

  drafts.forEach(function(draft){
    var card = el('div',{class:'draft-card'});
    var row1 = el('div',{class:'draft-card-row'});
    var titleInput = el('input',{type:'text', class:'draft-title-input', value:draft.title});
    titleInput.addEventListener('change', function(){
      var all = loadDrafts();
      var idx = all.findIndex(function(d){ return d.id === draft.id; });
      if(idx >= 0){
        all[idx].title = titleInput.value.trim() || 'Untitled draft';
        saveDrafts(all);
        if(editorState.draftId === draft.id){ editorState.title = all[idx].title; saveEditorState(); }
      }
    });
    row1.appendChild(titleInput);

    var loadBtn = el('button',{class:'btn small', onclick:function(){
      editorState = {content:draft.content, draftId:draft.id, title:draft.title};
      saveEditorState();
      currentWidget = 'editor';
      renderShell();
    }},[txt('Load')]);
    var delBtn = el('button',{class:'btn small danger', onclick:function(){
      if(!confirm('Delete "' + draft.title + '"? This cannot be undone.')) return;
      var all = loadDrafts().filter(function(d){ return d.id !== draft.id; });
      saveDrafts(all);
      if(editorState.draftId === draft.id){ editorState.draftId = null; saveEditorState(); }
      renderShell();
    }},[txt('Delete')]);
    row1.appendChild(loadBtn);
    row1.appendChild(delBtn);
    card.appendChild(row1);

    var words = draft.content.trim() ? draft.content.trim().split(/\s+/).length : 0;
    var updated = new Date(draft.updatedAt).toLocaleString();
    card.appendChild(el('div',{class:'draft-meta'},[txt(words + ' words \u00b7 updated ' + updated)]));

    var snippetText = draft.content.trim().slice(0, 160);
    card.appendChild(el('div',{class:'draft-snippet'},[txt(snippetText || '(empty)')]));

    wrap.appendChild(card);
  });

  return wrap;
}

function renderLibrary(){
  var wrap = el('div',{class:'panel'});
  wrap.appendChild(el('div',{class:'section-title'},[txt('LIBRARY'), el('span',{class:'n'},[txt('coming soon')])]));
  wrap.appendChild(el('div',{style:'font-family:var(--mono); color:var(--text-dim); padding:40px;'},[
    txt('A curated library of example texts and analytics will be available soon.')
  ]));
  return wrap;
}

function renderAdvanced(){
  var wrap = el('div',{class:'panel'});
  wrap.appendChild(el('div',{class:'section-title'},[txt('ADVANCED'), el('span',{class:'n'},[txt('coming soon')])]));
  wrap.appendChild(el('div',{style:'font-family:var(--mono); color:var(--text-dim); padding:40px;'},[
    txt('Advanced settings and custom WPM profiles will be available soon.')
  ]));
  return wrap;
}

function init(){
  loadSettings();
  renderShell();
}

window.addEventListener('DOMContentLoaded', init);
</script>
